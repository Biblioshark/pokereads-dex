<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokeReads Dex Auth Test</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f2f2f2; text-align:center; padding:40px; margin:0; }
    .container { background:white; padding:25px; border-radius:10px; max-width:500px; margin:auto; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
    input { width:90%; padding:10px; margin:8px 0; font-size:16px; box-sizing:border-box; }
    button { background:#ef5447; color:white; border:none; padding:12px 20px; font-size:16px; border-radius:6px; margin:6px; cursor:pointer; }
    #message { margin-top:12px; min-height:24px; white-space:pre-wrap; }
  </style>
</head>
<body>
  <div class="container">
    <h1>PokeReads Dex</h1>
    <p>Auth test only</p>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signUp()">Sign Up</button>
    <button onclick="logIn()">Log In</button>

    <p id="message"></p>
  </div>

<script>
const SUPABASE_URL = "https://xipsgbxamtcmamxwjzvc.supabase.co";
const SUPABASE_KEY = "sb_publishable_swWXrY2jEyzfi_m1Ml3OZA__tGjal3k";

function setMessage(text) {
  document.getElementById("message").innerText = text;
}

async function signUp() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    setMessage("Enter email and password.");
    return;
  }

  setMessage("Trying sign up...");

  try {
    const response = await fetch(SUPABASE_URL + "/auth/v1/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY
      },
      body: JSON.stringify({ email, password })
    });

    const data = await response.json();

    if (!response.ok) {
      setMessage("Sign up error: " + (data.msg || data.error_description || data.error || "Unknown error"));
      return;
    }

    setMessage("Account created. Check your email if confirmation is required.");
  } catch (err) {
    setMessage("Crash: " + err.message);
  }
}

async function logIn() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    setMessage("Enter email and password.");
    return;
  }

  setMessage("Trying log in...");

  try {
    const response = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY
      },
      body: JSON.stringify({ email, password })
    });

    const data = await response.json();

    if (!response.ok) {
      setMessage("Log in error: " + (data.msg || data.error_description || data.error || "Unknown error"));
      return;
    }

    setMessage("Logged in successfully.");
  } catch (err) {
    setMessage("Crash: " + err.message);
  }
}
</script>
</body>
</html>
