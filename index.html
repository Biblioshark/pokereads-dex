<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokeReads Dex Auth Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      text-align: center;
      padding: 40px;
      margin: 0;
    }
    .container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      background: #ef5447;
      color: white;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 6px;
      margin: 6px;
      cursor: pointer;
    }
    #message {
      margin-top: 12px;
      min-height: 24px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>PokeReads Dex</h1>
    <p>Auth test only</p>

    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />

    <button onclick="signUp()">Sign Up</button>
    <button onclick="logIn()">Log In</button>

    <p id="message"></p>
  </div>

  <script>
    const SUPABASE_URL = "https://xipsgbxamtcmamxwjzvc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_swWXrY2jEyzfi_m1Ml3OZA__tGjal3k";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function signUp() {
      const msg = document.getElementById("message");
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        msg.innerText = "Enter email and password.";
        return;
      }

      msg.innerText = "Trying sign up...";

      try {
        const { error } = await supabase.auth.signUp({
          email,
          password
        });

        if (error) {
          msg.innerText = "Sign up error: " + error.message;
        } else {
          msg.innerText = "Account created. Check your email if confirmation is required.";
        }
      } catch (err) {
        msg.innerText = "Crash: " + err.message;
      }
    }

    async function logIn() {
      const msg = document.getElementById("message");
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        msg.innerText = "Enter email and password.";
        return;
      }

      msg.innerText = "Trying log in...";

      try {
        const { error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          msg.innerText = "Log in error: " + error.message;
        } else {
          msg.innerText = "Logged in successfully.";
        }
      } catch (err) {
        msg.innerText = "Crash: " + err.message;
      }
    }
  </script>
</body>
</html>
